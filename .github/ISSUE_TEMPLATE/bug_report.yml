name: Bug Report
description: Something is broken or not working as expected
labels: ['bug', 'needs-triage']

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Clear steps to reproduce help
        us fix it much faster.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See the error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, app version, or anything else relevant.
      placeholder: Chrome 125 on Windows 11
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
