name: Feature Request
description: Suggest an improvement or new capability
labels: ['enhancement', 'needs-review']

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The limitation or pain point you're hitting today.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen? A rough idea is fine.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: Mockups, links, examples, or alternatives you considered.

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched existing requests and this is not a duplicate.
          required: true
