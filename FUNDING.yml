# Organization-wide funding configuration for chessviewer-org.
#
# GitHub reads this file from the special `.github` repository and applies it as
# the default "Sponsor" button for every repository in the organization that
# does not define its own `.github/FUNDING.yml`.
#
# GitHub Sponsors is not set up for this organization. Support is accepted
# directly via crypto (USDT / USDC / ETH, single EVM wallet address) — see the
# "Support the project" section in this repository's README for the address.

custom: ['https://github.com/chessviewer-org/.github#support-the-project']
